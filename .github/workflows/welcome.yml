name: Welcome new contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue on varth! A maintainer will triage this shortly.
            While you wait, make sure you've checked the [existing issues](https://BlusceLabs/varth/issues) for duplicates.
          pr-message: |
            👋 Thanks for your first PR on varth! A maintainer will review it soon.
            Please make sure your PR links to an open issue and your checklist is complete.
